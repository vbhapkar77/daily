# OpenAPI fragment added by spec 001 — auth.
# These paths and schemas get merged into docs/api/openapi.yaml when the spec is approved.

paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create a new account
      description: |
        Creates a user with bcrypt-hashed password. On success, sets a 30-day
        JWT session cookie and returns the User. Rate-limited by IP.
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created; session cookie set
          headers:
            Set-Cookie:
              schema: { type: string, example: "session=eyJhbGc...; HttpOnly; Secure; SameSite=Lax; Max-Age=2592000" }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400':
          description: Validation failed (e.g., password too short, email malformed)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '409':
          description: An account with this email already exists
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '429':
          description: Too many signup attempts from this IP
          headers:
            Retry-After:
              schema: { type: integer, description: Seconds to wait before retry }
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in to an existing account
      description: |
        Verifies credentials and on success sets a 30-day JWT session cookie.
        Returns the same generic error message for "wrong password" and "no such
        user" to prevent user enumeration.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Signed in successfully
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials (generic; covers both wrong-password and unknown-email)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '429':
          description: Too many failed attempts for this email + IP within the last 15 minutes
          headers:
            Retry-After:
              schema: { type: integer }
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Sign out (invalidate session cookie)
      operationId: logout
      responses:
        '204':
          description: Logged out; cookie cleared
          headers:
            Set-Cookie:
              schema: { type: string, example: "session=; Max-Age=0" }
        '401':
          description: Not authenticated (no session cookie)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/v1/auth/forgot:
    post:
      tags: [Auth]
      summary: Request a password-reset email
      description: |
        ALWAYS returns 200 with the same generic message, whether or not the
        email exists in the system. If the email exists, a single-use token
        (valid for 1 hour) is emailed via Resend. Rate-limited by IP.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotRequest' }
      responses:
        '200':
          description: Acknowledged (intentionally generic — see description)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericMessage' }
        '429':
          description: Too many forgot-password requests from this IP
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/v1/auth/reset:
    post:
      tags: [Auth]
      summary: Set a new password using a reset token
      description: |
        Verifies the token (must be unexpired, unused, and match a stored hash),
        replaces the user's bcrypt password hash, and marks the token used.
        User must log in explicitly after this — no automatic session is created.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetRequest' }
      responses:
        '200':
          description: Password updated; user should now log in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericMessage' }
        '400':
          description: Token invalid, expired, or already used (generic; no enumeration)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

# These schemas are merged into the top-level components/schemas section.
components:
  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email, example: alice@example.com }
        password: { type: string, format: password, minLength: 8, example: correcthorse }
        name:     { type: string, nullable: true, example: Alice }
        timezone: { type: string, nullable: true, description: "Optional IANA tz; defaults to UTC", example: Asia/Kolkata }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, format: password }

    ForgotRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ResetRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:       { type: string, description: "Token from the reset email link", example: ABC123def456... }
        newPassword: { type: string, format: password, minLength: 8 }

    GenericMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: If an account with that email exists, we've sent a reset link.
